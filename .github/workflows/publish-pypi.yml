# Publie sur PyPI quand tu crées une release GitHub (ou déclenchement manuel).
# À configurer une fois sur https://pypi.org/manage/project/paststack/settings/publishing/
# → « Trusted Publisher » : GitHub, dépôt, workflow = publish-pypi.yml

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
